services:
  mir.postgres:
    image: postgres:16
    hostname: mir.postgres
    container_name: mir.postgres
    ports:
    - ${POSTGRES_PORT}:5432
    volumes:
    - pgdata:/var/lib/postgresql/data
    env_file:
    - ./.env
  mir.backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - ${APP_PORT}:8080
    env_file:
    - ./.env
  mir.redis:
    image: valkey/valkey:latest
    hostname: mir.redis
    container_name: mir.redis
    command: /bin/sh -c "redis-server --requirepass ${REDIS_PASSWORD}"
    ports:
    - ${REDIS_PORT}:6379
    volumes:
    - redis_data:/data
    env_file:
    - ./.env
volumes:
  pgdata:
  redis_data:
